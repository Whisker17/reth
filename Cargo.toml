# Mantle op-reth Workspace
#
# Structure:
#   op-reth/       — OP Stack execution layer (from ethereum-optimism/optimism, op-reth/v2.2.1)
#   mantle-reth/   — Mantle trait override layer (custom)
#   patches/       — Minimal reth core patches (via [patch])
#
# Dependency strategy:
#   reth crates    → paradigmxyz/reth rev 88505c7f (= v2.2.0, same as upstream op-reth pins)
#   revm/op-revm   → mantle-xyz/revm branch mantle-elysium (Mantle fee model patches)
#   revm-inspectors → mantle-xyz/revm-inspectors branch mantle-elysium
#   alloy-evm      → crates.io 0.34.0 (temporary, later switch to mantle-xyz/evm)
#   alloy-op-evm   → crates.io 0.31.0 (temporary, later switch to mantle-xyz/evm)
#   op-alloy       → crates.io 0.24.0 (temporary, later switch to mantle-xyz/op-alloy)
#   alloy base     → crates.io 2.0.4

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.94"
authors = ["Mantle Core Contributors"]
homepage = "https://github.com/mantle-xyz/reth"
repository = "https://github.com/mantle-xyz/reth"
exclude = ["**/target"]

[workspace]
resolver = "2"
members = [
  # Op-Reth (from upstream ethereum-optimism/optimism, op-reth/v2.2.1)
  "op-reth/bin/",
  "op-reth/crates/chainspec/",
  "op-reth/crates/cli/",
  "op-reth/crates/consensus/",
  "op-reth/crates/evm/",
  "op-reth/crates/flashblocks/",
  "op-reth/crates/hardforks/",
  "op-reth/crates/node/",
  "op-reth/crates/payload/",
  "op-reth/crates/primitives/",
  "op-reth/crates/reth/",
  "op-reth/crates/rpc/",
  "op-reth/crates/storage/",
  "op-reth/crates/exex/",
  "op-reth/crates/trie/",
  "op-reth/crates/txpool/",

  # Mantle-Reth (trait override layer, new)
  # Uncomment as crates are created:
  # "mantle-reth/crates/eth-api/",
  # "mantle-reth/crates/chainspec/",
  # "mantle-reth/crates/consensus/",
  # "mantle-reth/crates/validator/",
  # "mantle-reth/crates/rpc-ext/",
  # "mantle-reth/crates/cli/",
  # "mantle-reth/crates/exex/",
  # "mantle-reth/crates/hardforks/",
]
default-members = [
  "op-reth/bin/",
]

# ==================== WORKSPACE LINTS ====================
[workspace.lints.rust]
missing-debug-implementations = "warn"
missing-docs = "warn"
unreachable-pub = "warn"
unused-must-use = "deny"
rust-2018-idioms = { level = "deny", priority = -1 }
unnameable-types = "warn"
rust-2024-incompatible-pat = "warn"

[workspace.lints.rustdoc]
all = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
dbg_macro = "warn"
doc_markdown = "warn"
use-self = "warn"
# Allow patterns common in Mantle code
cognitive_complexity = "allow"
result_large_err = "allow"
too_long_first_doc_paragraph = "allow"

# ==================== PROFILES ====================
[profile.dev]
opt-level = 1
overflow-checks = false
debug = "line-tables-only"
split-debuginfo = "unpacked"

[profile.release]
opt-level = 3
lto = "thin"
debug = "none"
strip = "symbols"
panic = "unwind"
codegen-units = 16

[profile.maxperf]
inherits = "release"
lto = "fat"
codegen-units = 1

[profile.hivetests]
inherits = "test"
opt-level = 3
lto = "thin"

# ==================== WORKSPACE DEPENDENCIES ====================
[workspace.dependencies]

# ==================== OP-RETH INTERNAL CRATES ====================
op-reth = { path = "op-reth/bin/" }
reth-optimism-chainspec = { path = "op-reth/crates/chainspec/", default-features = false }
