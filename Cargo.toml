tokio-stream = "0.1.18"
tokio-util = { version = "0.7.18", features = ["codec"] }

# ==================== RPC ====================
jsonrpsee = { version = "0.26.0", features = ["jsonrpsee-core", "client-core", "server-core", "macros"] }
jsonrpsee-core = "0.26.0"
jsonrpsee-server = "0.26.0"
jsonrpsee-http-client = "0.26.0"
jsonrpsee-types = "0.26.0"

# ==================== CRYPTO ====================
c-kzg = { version = "2.1.5", default-features = false }
enr = { version = "0.13", default-features = false }
k256 = { version = "0.13", default-features = false, features = ["ecdsa"] }
sha2 = { version = "0.10.9", default-features = false }
secp256k1 = { version = "0.31.1", default-features = false }

# ==================== SERIALIZATION ====================
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc"] }
serde_repr = "0.1.20"
serde_with = { version = "3.16", default-features = false, features = ["macros"] }
toml = { version = "0.9.12", default-features = false }

# ==================== METRICS ====================
metrics = { version = "0.24.3", default-features = false }
metrics-derive = "0.1"
metrics-exporter-prometheus = { version = "0.18.1", default-features = false }
metrics-process = "2.4.3"
metrics-util = { version = "0.20.1", default-features = false }

# ==================== TRACING ====================
tracing = { version = "0.1.44", default-features = false }
tracing-appender = "0.2.4"
tracing-subscriber = { version = "0.3.22", default-features = false }

# ==================== TESTING ====================
arbitrary = { version = "1.4.2", features = ["derive"] }
assert_matches = "1.5.0"
proptest = "1.10.0"
proptest-derive = "0.7"
proptest-arbitrary-interop = "0.1.0"
rstest = "0.26.1"
similar-asserts = { version = "1.7.0", features = ["serde"] }
tempfile = "3.24.0"
serial_test = "3"
test-fuzz = "7.2.5"

# ==================== MISC ====================
auto_impl = "1.3.0"
bytes = { version = "1.11.1", default-features = false }
cfg-if = "1.0.4"
clap = { version = "4", features = ["derive"] }
derive_more = { version = "2.0", default-features = false }
eyre = "0.6"
itertools = "0.15"
once_cell = "1.21"
parking_lot = "0.12"
rand = "0.9.1"
rayon = "1.10.0"
schnellru = "0.2"
strum = { version = "0.27", features = ["derive"] }
thiserror = { version = "2", default-features = false }
url = "2.5"

# ==================== [patch] — reth core minimal patches ====================
# Uncomment when patches/ crates are populated:
# [patch."https://github.com/paradigmxyz/reth"]
# reth-trie-common = { path = "patches/reth-trie-common" }
# reth-rpc = { path = "patches/reth-rpc" }
# reth-transaction-pool = { path = "patches/reth-transaction-pool" }
