[build]
pre-build = [
    # Use HTTPS for package sources
    "apt-get update && apt-get install --assume-yes --no-install-recommends ca-certificates",
    "find /etc/apt/ -type f \\( -name '*.list' -o -name '*.sources' \\) -exec sed -i 's|http://|https://|g' {} +",

    # Configure APT retries and timeouts to handle network issues
    "echo 'Acquire::Retries \"3\";' > /etc/apt/apt.conf.d/80-retries",
    "echo 'Acquire::http::Timeout \"60\";' >> /etc/apt/apt.conf.d/80-retries",
    "echo 'Acquire::ftp::Timeout \"60\";' >> /etc/apt/apt.conf.d/80-retries",

    # rust-bindgen dependencies: llvm-dev libclang-dev (>= 10) clang (>= 10)
    # See: https://github.com/cross-rs/cross/wiki/FAQ#using-clang--bindgen for
    # recommended clang versions for the given cross and bindgen version.
    "apt-get update && apt-get install --assume-yes --no-install-recommends llvm-dev libclang-dev clang",
]

[target.x86_64-unknown-linux-gnu]
# Ubuntu 24.04 for glibc 2.39 (matching GitHub Actions runners) AND gcc 13+
# (avoiding aws-lc-sys gcc memcmp bug https://gcc.gnu.org/bugzilla/show_bug.cgi?id=95189).
# cross's default image has old gcc that triggers the bug.
#
# stdarg.h fix: copy from gcc include dir into clang resource-dir, since bare
# ubuntu:24.04 clang package doesn't install it there.
image = "ubuntu:24.04"
pre-build = [
    "apt-get update && apt-get install --assume-yes --no-install-recommends ca-certificates",
    "find /etc/apt/ -type f \\( -name '*.list' -o -name '*.sources' \\) -exec sed -i 's|http://|https://|g' {} +",
    "echo 'Acquire::Retries \"3\";' > /etc/apt/apt.conf.d/80-retries",
    "echo 'Acquire::http::Timeout \"60\";' >> /etc/apt/apt.conf.d/80-retries",
    "echo 'Acquire::ftp::Timeout \"60\";' >> /etc/apt/apt.conf.d/80-retries",
    "apt-get update && apt-get install --assume-yes --no-install-recommends gcc g++ make pkg-config llvm-dev libclang-dev clang cmake",
    "CLANG_RES=$(clang -print-resource-dir) && GCC_STDARG=$(find /usr/lib/gcc -name stdarg.h | head -1) && mkdir -p ${CLANG_RES}/include && cp ${GCC_STDARG} ${CLANG_RES}/include/",
]

[target.aarch64-unknown-linux-gnu]
# Same ubuntu:24.04 pin as x86_64. aarch64 is cross-compiled; build scripts
# run on the x86_64 host inside this container.
image = "ubuntu:24.04"
pre-build = [
    "apt-get update && apt-get install --assume-yes --no-install-recommends ca-certificates",
    "find /etc/apt/ -type f \\( -name '*.list' -o -name '*.sources' \\) -exec sed -i 's|http://|https://|g' {} +",
    "echo 'Acquire::Retries \"3\";' > /etc/apt/apt.conf.d/80-retries",
    "echo 'Acquire::http::Timeout \"60\";' >> /etc/apt/apt.conf.d/80-retries",
    "echo 'Acquire::ftp::Timeout \"60\";' >> /etc/apt/apt.conf.d/80-retries",
    "apt-get update && apt-get install --assume-yes --no-install-recommends gcc g++ make pkg-config llvm-dev libclang-dev clang cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu",
    "CLANG_RES=$(clang -print-resource-dir) && GCC_STDARG=$(find /usr/lib/gcc -name stdarg.h | head -1) && mkdir -p ${CLANG_RES}/include && cp ${GCC_STDARG} ${CLANG_RES}/include/",
]
env.passthrough = [
    "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc",
    "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc",
    "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++",
]

[target.x86_64-pc-windows-gnu]
dockerfile = "./Dockerfile.x86_64-pc-windows-gnu"

[target.riscv64gc-unknown-linux-gnu]
image = "ubuntu:24.04"
pre-build = [
    "apt update",
    "apt install --yes gcc gcc-riscv64-linux-gnu libclang-dev make",
]
env.passthrough = [
    "CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER=riscv64-linux-gnu-gcc",
]

[build.env]
passthrough = ["JEMALLOC_SYS_WITH_LG_PAGE"]
