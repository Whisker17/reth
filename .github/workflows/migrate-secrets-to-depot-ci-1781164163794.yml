name: Import secrets and variables to Depot CI
on: push

permissions:
  id-token: write
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: |
          unset DEPOT_TOKEN
          depot ci secrets add ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" ANTHROPIC_BASE_URL="$ANTHROPIC_BASE_URL" BOT_GITHUB_TOKEN="$BOT_GITHUB_TOKEN" LARK_WEBHOOK_URL="$LARK_WEBHOOK_URL" --repo Whisker17/reth
  variables:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import variables
        env:
          CODEX_GATEWAY_HOSTNAME: ${{ vars.CODEX_GATEWAY_HOSTNAME }}
          LLM_GATEWAY_HOSTNAME: ${{ vars.LLM_GATEWAY_HOSTNAME }}
        run: |
          unset DEPOT_TOKEN
          depot ci vars add CODEX_GATEWAY_HOSTNAME="$CODEX_GATEWAY_HOSTNAME" LLM_GATEWAY_HOSTNAME="$LLM_GATEWAY_HOSTNAME" --repo Whisker17/reth
