name: Update op-reth

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: Base branch to sync onto
        required: true
        default: mantle-elysium
        type: string
      target_tag:
        description: Optional upstream op-reth tag override, e.g. op-reth/v2.3.0
        required: false
        type: string
      dry_run:
        description: Run sync and validation without pushing or creating/updating PR
        required: false
        default: true
        type: boolean

concurrency:
  group: update-op-reth
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-op-reth:
    name: Sync op-reth
    runs-on: ${{ vars.OP_RETH_AUTO_BUMP_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 120
    env:
      BASE_BRANCH: ${{ inputs.base_branch }}
      TARGET_TAG: ${{ inputs.target_tag }}
      DRY_RUN: ${{ inputs.dry_run }}
      GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
      BRANCH_NAME: op-reth-auto-bump
      ARTIFACT_DIR: .op-reth-auto-bump-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node for Claude Code
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Sync op-reth and create PR
        shell: bash
        run: |
          set -Eeuo pipefail

          DATE="$(date -u +%Y-%m-%d)"
          MAX_ATTEMPTS=8
          AI_DEADLINE_SECONDS=$((SECONDS + 2700))
          UPSTREAM_REMOTE="https://github.com/ethereum-optimism/optimism.git"
          UPSTREAM_WORKTREE="/tmp/optimism-op-reth"
          OLD_ROOT="/tmp/op-reth-old"
          NEW_ROOT="/tmp/op-reth-new"
          CONFLICT_REPORT="docs/op-reth-auto-bump-conflicts.md"

          mkdir -p "$ARTIFACT_DIR"
          rm -f "$CONFLICT_REPORT"
          > /tmp/patch-conflicts.txt
          > /tmp/manual-conflicts.txt
          > /tmp/compat-report.txt

          validation_status="failed"
          reth_rev_bumped=false
          rev_extraction_failed=false
          lock_update_failed=false
          has_unresolved_conflicts=false
          has_manual_conflicts=false
          sync_committed=false
          pr_url=""
          pr_number=""

          git config user.name "mantle-op-reth-auto-bump"
          git config user.email "actions@github.com"
          git fetch origin "$BASE_BRANCH"
          BASE_SHA="$(git rev-parse "origin/${BASE_BRANCH}")"

          send_lark() {
            local title="$1"
            local content="$2"

            if [ -z "${LARK_WEBHOOK_URL:-}" ]; then
              echo "::warning::LARK_WEBHOOK_URL is not set; skipping notification"
              return 0
            fi

            jq -n \
              --arg title "$title" \
              --arg content "$content" \
              '{
                msg_type: "interactive",
                card: {
                  config: {wide_screen_mode: true},
                  header: {title: {tag: "plain_text", content: $title}},
                  elements: [{tag: "div", text: {tag: "lark_md", content: $content}}]
                }
              }' > /tmp/lark-payload.json

            curl -sf -X POST "$LARK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @/tmp/lark-payload.json || echo "::warning::Lark notification failed"
          }

          commit_staged_if_needed() {
            local message="$1"
            if git diff --cached --quiet; then
              git reset -q
              return 1
            fi
            git commit -m "$message"
          }

          is_binary() {
            LC_ALL=C head -c 8000 "$1" | grep -qP '\x00'
          }

          write_conflict_report() {
            mkdir -p docs
            {
              echo "# op-reth Auto Bump Conflicts"
              echo
              echo "Generated by workflow run ${GITHUB_RUN_NUMBER:-local} on ${DATE}."
              echo
              echo "- Base branch: \`${BASE_BRANCH}\` at \`${BASE_SHA:0:7}\`"
              echo "- Upstream range: \`${OLD_TAG}\` -> \`${NEW_TAG}\`"
              echo "- Validation status: \`${validation_status}\`"
              echo
              if [ -s /tmp/patch-conflicts.txt ]; then
                echo "## Marker Conflicts"
                echo
                echo '```'
                cat /tmp/patch-conflicts.txt
                echo '```'
                echo
              fi
              if [ -s /tmp/manual-conflicts.txt ]; then
                echo "## Manual Conflicts"
                echo
                echo '```'
                cat /tmp/manual-conflicts.txt
                echo '```'
                echo
              fi
              echo "Before this PR can be marked ready, resolve the files above and remove this report."
            } > "$CONFLICT_REPORT"
          }

          build_artifacts() {
            cp /tmp/patch-conflicts.txt "$ARTIFACT_DIR/patch-conflicts.txt" 2>/dev/null || true
            cp /tmp/manual-conflicts.txt "$ARTIFACT_DIR/manual-conflicts.txt" 2>/dev/null || true
            cp /tmp/compat-report.txt "$ARTIFACT_DIR/compat-report.md" 2>/dev/null || true
            cp /tmp/pr-body.txt "$ARTIFACT_DIR/pr-body.md" 2>/dev/null || true
            git diff --binary > "$ARTIFACT_DIR/worktree.diff" || true
          }

          if [ ! -f .op-reth-base-tag ]; then
            echo "::error::.op-reth-base-tag does not exist"
            send_lark "op-reth auto-bump failed" ".op-reth-base-tag is missing on ${BASE_BRANCH}."
            exit 1
          fi

          OLD_TAG="$(tr -d '[:space:]' < .op-reth-base-tag)"
          if [ -z "$OLD_TAG" ]; then
            echo "::error::.op-reth-base-tag is empty"
            send_lark "op-reth auto-bump failed" ".op-reth-base-tag is empty on ${BASE_BRANCH}."
            exit 1
          fi

          if [ -n "${TARGET_TAG:-}" ]; then
            NEW_TAG="$TARGET_TAG"
          else
            NEW_TAG="$(gh api repos/ethereum-optimism/optimism/git/refs/tags --paginate \
              --jq '[.[].ref | ltrimstr("refs/tags/")
                    | select(startswith("op-reth/v"))
                    | select(test("-rc|-dev|-pr") | not)]
                    | sort_by(ltrimstr("op-reth/v") | split(".") | map(tonumber))
                    | last')"
          fi

          if [[ ! "$NEW_TAG" =~ ^op-reth/v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Invalid target tag: $NEW_TAG"
            send_lark "op-reth auto-bump failed" "Invalid target tag: ${NEW_TAG}"
            exit 1
          fi

          if ! git ls-remote --exit-code --tags "$UPSTREAM_REMOTE" "refs/tags/${NEW_TAG}" >/dev/null 2>&1; then
            echo "::error::Target tag does not exist upstream: $NEW_TAG"
            send_lark "op-reth auto-bump failed" "Target tag does not exist upstream: ${NEW_TAG}"
            exit 1
          fi

          if [ "$OLD_TAG" = "$NEW_TAG" ]; then
            echo "::notice::Already up to date: $OLD_TAG"
            send_lark "op-reth auto-bump: no update" "Current tag ${OLD_TAG}; no update needed."
            exit 0
          fi

          if [ "$DRY_RUN" = "true" ]; then
            git switch -C "$BRANCH_NAME" "origin/${BASE_BRANCH}"
          elif git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME"
            git switch -C "$BRANCH_NAME" FETCH_HEAD
            set +e
            git rebase "origin/${BASE_BRANCH}"
            rebase_exit=$?
            set -e
            if [ "$rebase_exit" -ne 0 ]; then
              git rebase --abort || true
              git switch -C "$BRANCH_NAME" "origin/${BASE_BRANCH}"
            fi
          else
            git switch -C "$BRANCH_NAME" "origin/${BASE_BRANCH}"
          fi

          rm -rf "$UPSTREAM_WORKTREE" "$OLD_ROOT" "$NEW_ROOT"
          git clone --filter=blob:none --no-checkout "$UPSTREAM_REMOTE" "$UPSTREAM_WORKTREE"
          git -C "$UPSTREAM_WORKTREE" sparse-checkout set --no-cone 'rust/op-reth/**' 'rust/Cargo.toml'

          git -C "$UPSTREAM_WORKTREE" checkout "$OLD_TAG"
          mkdir -p "$OLD_ROOT"
          cp -a "$UPSTREAM_WORKTREE/rust/op-reth/." "$OLD_ROOT/"

          git -C "$UPSTREAM_WORKTREE" checkout "$NEW_TAG"
          mkdir -p "$NEW_ROOT"
          cp -a "$UPSTREAM_WORKTREE/rust/op-reth/." "$NEW_ROOT/"
          cp "$UPSTREAM_WORKTREE/rust/Cargo.toml" /tmp/upstream-cargo-new.toml

          (cd "$OLD_ROOT" && find . -type f | sed 's#^[.]/##' | sort) > /tmp/files-old.txt
          (cd "$NEW_ROOT" && find . -type f | sed 's#^[.]/##' | sort) > /tmp/files-new.txt
          (cd op-reth && find . -type f | sed 's#^[.]/##' | sort) > /tmp/files-local.txt

          while IFS= read -r rel; do
            [ -n "$rel" ] || continue
            OLD="$OLD_ROOT/$rel"
            NEW="$NEW_ROOT/$rel"
            LOCAL="op-reth/$rel"

            if [ ! -e "$OLD" ] && [ -e "$NEW" ]; then
              mkdir -p "$(dirname "$LOCAL")"
              cp -a "$NEW" "$LOCAL"
              continue
            fi

            if [ -e "$OLD" ] && [ ! -e "$NEW" ]; then
              if [ -e "$LOCAL" ] && ! diff -q "$LOCAL" "$OLD" >/dev/null 2>&1; then
                echo "$LOCAL (upstream deleted, local modified)" >> /tmp/manual-conflicts.txt
              elif [ -e "$LOCAL" ]; then
                rm -f "$LOCAL"
              fi
              continue
            fi

            if [ ! -e "$LOCAL" ]; then
              mkdir -p "$(dirname "$LOCAL")"
              cp -a "$NEW" "$LOCAL"
              if ! diff -q "$OLD" "$NEW" >/dev/null 2>&1; then
                echo "$LOCAL (local deleted, upstream modified; took upstream)" >> /tmp/manual-conflicts.txt
              fi
              continue
            fi

            if diff -q "$OLD" "$NEW" >/dev/null 2>&1; then
              continue
            fi

            if is_binary "$OLD" || is_binary "$NEW" || is_binary "$LOCAL"; then
              if diff -q "$LOCAL" "$OLD" >/dev/null 2>&1; then
                cp -a "$NEW" "$LOCAL"
              else
                echo "$LOCAL (binary conflict: local and upstream both modified)" >> /tmp/manual-conflicts.txt
              fi
              continue
            fi

            set +e
            git merge-file "$LOCAL" "$OLD" "$NEW"
            merge_exit=$?
            set -e

            if [ "$merge_exit" -gt 0 ] && [ "$merge_exit" -lt 128 ]; then
              echo "$LOCAL" >> /tmp/patch-conflicts.txt
            elif [ "$merge_exit" -ge 128 ]; then
              echo "$LOCAL (merge-file error, exit $merge_exit)" >> /tmp/manual-conflicts.txt
            fi
          done < <(sort -u /tmp/files-old.txt /tmp/files-new.txt /tmp/files-local.txt)

          echo "$NEW_TAG" > .op-reth-base-tag

          marker_conflicts="$(wc -l < /tmp/patch-conflicts.txt | tr -d ' ')"
          manual_conflicts="$(wc -l < /tmp/manual-conflicts.txt | tr -d ' ')"
          total_conflicts=$((marker_conflicts + manual_conflicts))
          echo "::notice::Three-way merge complete: ${marker_conflicts} marker conflict(s), ${manual_conflicts} manual conflict(s)"

          if [ "$total_conflicts" -eq 0 ]; then
            git add op-reth/ .op-reth-base-tag
            commit_staged_if_needed "deps: sync op-reth from ${OLD_TAG} to ${NEW_TAG} (${DATE})" || true
            sync_committed=true
          else
            sync_committed=false
          fi

          local_revs="$(grep 'paradigmxyz/reth' Cargo.toml | grep -oP 'rev = "\K[0-9a-f]{40}' | sort -u || true)"
          local_rev_count="$(echo "$local_revs" | grep -c . || true)"
          if [ "$local_rev_count" -ne 1 ]; then
            echo "::error::Expected one local reth rev, got ${local_rev_count}: ${local_revs}"
            rev_extraction_failed=true
            CURRENT_RETH_REV=""
          else
            CURRENT_RETH_REV="$local_revs"
          fi

          UPSTREAM_RETH_REV="$(grep -m1 'paradigmxyz/reth' /tmp/upstream-cargo-new.toml | grep -oP 'rev = "\K[^"]+' || true)"
          if ! echo "$UPSTREAM_RETH_REV" | grep -qP '^[0-9a-f]{40}$'; then
            echo "::error::Failed to extract valid upstream reth rev: $UPSTREAM_RETH_REV"
            rev_extraction_failed=true
          fi

          if [ "$rev_extraction_failed" != "true" ] && [ "$CURRENT_RETH_REV" != "$UPSTREAM_RETH_REV" ]; then
            sed -i "s/${CURRENT_RETH_REV}/${UPSTREAM_RETH_REV}/g" Cargo.toml
            reth_rev_bumped=true

            set +e
            cargo update
            cargo_update_exit=$?
            set -e
            if [ "$cargo_update_exit" -ne 0 ]; then
              lock_update_failed=true
            fi

            git add Cargo.toml Cargo.lock
            commit_staged_if_needed "deps: bump reth rev to ${UPSTREAM_RETH_REV:0:7} from ${NEW_TAG} (${DATE})" || true
          fi

          {
            echo "### Mantle Fork Dependency Report"
            echo
            echo "| Dependency family | Current references |"
            echo "|-------------------|--------------------|"
            for repo in \
              "mantle-xyz/revm" \
              "mantle-xyz/revm-inspectors" \
              "mantle-xyz/evm" \
              "mantlenetworkio/mantle-v2"; do
              refs="$(grep -RIn "$repo" Cargo.toml op-reth/ mantle-reth/ patches/ 2>/dev/null | sed 's/|/\\|/g' || true)"
              if [ -z "$refs" ]; then
                refs="_not found_"
              else
                refs="<details><summary>matches</summary><br><pre>${refs}</pre></details>"
              fi
              echo "| \`${repo}\` | ${refs} |"
            done
            echo
            echo "Mantle fork dependencies are reported only. This workflow does not bump fork branches automatically."
          } > /tmp/compat-report.txt

          compilation_fixed=false
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if [ "$SECONDS" -gt "$AI_DEADLINE_SECONDS" ]; then
              echo "::warning::AI fix deadline reached"
              break
            fi

            remaining_markers="$(grep -IRl '<<<<<<<' op-reth/ mantle-reth/ patches/ Cargo.toml Cargo.lock 2>/dev/null || true)"
            if [ -n "$remaining_markers" ]; then
              has_unresolved_conflicts=true
              if ! command -v claude >/dev/null 2>&1; then
                echo "::warning::claude CLI not available; leaving conflict markers for manual review"
                break
              fi

              conflict_prompt="$(cat <<PROMPT_EOF
          Resolve merge conflict markers left by op-reth sync from ${OLD_TAG} to ${NEW_TAG}.

          Files:
          ${remaining_markers}

          Rules:
          - Only edit op-reth/, mantle-reth/, patches/, Cargo.toml, and Cargo.lock if required.
          - Do not change git URLs, revs, or branch references unless a conflict marker requires it.
          - Preserve Mantle-specific behavior.
          - Remove every conflict marker.
          PROMPT_EOF
          )"

              set +e
              claude -p "$conflict_prompt" \
                --allowedTools "Bash(cargo *)" "Bash(git diff *)" "Bash(grep *)" "Bash(find *)" "Read" "Edit" \
                --max-turns 30
              set -e
              continue
            fi

            has_unresolved_conflicts=false

            set +e
            cargo check --workspace 2>&1
            check_exit=$?
            set -e
            if [ "$check_exit" -eq 0 ]; then
              compilation_fixed=true
              break
            fi

            if ! command -v claude >/dev/null 2>&1; then
              echo "::warning::claude CLI not available; skipping AI compilation fix"
              break
            fi

            set +e
            check_output="$(cargo check --workspace 2>&1 | tail -200)"
            set -e

            fix_prompt="$(cat <<PROMPT_EOF
          This Rust workspace synced op-reth/ from upstream ${OLD_TAG} to ${NEW_TAG}.
          The paradigmxyz/reth rev was ${CURRENT_RETH_REV:-unknown} -> ${UPSTREAM_RETH_REV:-unknown}.

          cargo check is failing:

          ${check_output}

          Please fix compilation errors.

          Rules:
          - Fix files in op-reth/ and mantle-reth/ first.
          - reth core crates come from paradigmxyz/reth git deps; do not modify their source.
          - Do not modify Cargo.toml git URLs, revs, or branch references.
          - Do not suppress warnings with allow attributes.
          - Focus on compilation errors, not warnings.
          PROMPT_EOF
          )"

            set +e
            claude -p "$fix_prompt" \
              --allowedTools "Bash(cargo *)" "Bash(git diff *)" "Bash(grep *)" "Bash(find *)" "Read" "Edit" \
              --max-turns 30
            set -e
          done

          remaining_markers="$(grep -IRl '<<<<<<<' op-reth/ mantle-reth/ patches/ Cargo.toml Cargo.lock 2>/dev/null || true)"
          if [ -n "$remaining_markers" ]; then
            has_unresolved_conflicts=true
          else
            has_unresolved_conflicts=false
          fi

          if [ -s /tmp/manual-conflicts.txt ]; then
            has_manual_conflicts=true
          else
            has_manual_conflicts=false
          fi

          if [ "$sync_committed" != "true" ]; then
            if [ "$has_unresolved_conflicts" = "true" ] || [ "$has_manual_conflicts" = "true" ]; then
              validation_status="failed"
              write_conflict_report
              git add op-reth/ mantle-reth/ patches/ .op-reth-base-tag "$CONFLICT_REPORT"
              commit_staged_if_needed "wip: unresolved op-reth sync conflicts from ${OLD_TAG} to ${NEW_TAG} (${DATE})" || true
              sync_committed="wip"
            else
              git add op-reth/ .op-reth-base-tag
              commit_staged_if_needed "deps: sync op-reth from ${OLD_TAG} to ${NEW_TAG} (${DATE})" || true
              sync_committed=true
            fi
          elif [ -n "$(git diff --name-only op-reth/ mantle-reth/ patches/)" ]; then
            if [ "$has_unresolved_conflicts" = "true" ] || [ "$has_manual_conflicts" = "true" ]; then
              validation_status="failed"
              write_conflict_report
              git add op-reth/ mantle-reth/ patches/ "$CONFLICT_REPORT"
              commit_staged_if_needed "wip: unresolved op-reth follow-up fixes (${DATE})" || true
            else
              git add op-reth/ mantle-reth/ patches/
              commit_staged_if_needed "fix: resolve breaking changes from op-reth sync (${DATE})" || true
            fi
          fi

          set +e
          cargo check --workspace 2>&1
          check_passed=$?
          cargo test --workspace --no-run 2>&1
          test_build_passed=$?
          if [ "$test_build_passed" -eq 0 ]; then
            cargo test \
              -p reth-optimism-node \
              -p reth-optimism-evm \
              -p reth-optimism-consensus \
              -p mantle-reth-cli \
              --lib --all-features 2>&1
            targeted_tests_passed=$?

            cargo test -p mantle-reth-integration-tests --no-run 2>&1
            integration_build_passed=$?
          else
            targeted_tests_passed=1
            integration_build_passed=1
          fi
          set -e

          if [ "$rev_extraction_failed" = "true" ] || [ "$has_unresolved_conflicts" = "true" ] || [ "$has_manual_conflicts" = "true" ]; then
            validation_status="failed"
          elif [ "$check_passed" -eq 0 ] && [ "$test_build_passed" -eq 0 ] && [ "$targeted_tests_passed" -eq 0 ] && [ "$integration_build_passed" -eq 0 ]; then
            validation_status="passed"
          elif [ "$check_passed" -eq 0 ]; then
            validation_status="partial"
          else
            validation_status="failed"
          fi

          failure_summary=""
          if [ "$rev_extraction_failed" = "true" ]; then
            failure_summary="${failure_summary}- reth rev extraction failed\n"
          fi
          if [ "$has_unresolved_conflicts" = "true" ]; then
            failure_summary="${failure_summary}- unresolved merge conflict markers remain\n"
          fi
          if [ "$has_manual_conflicts" = "true" ]; then
            failure_summary="${failure_summary}- manual structural conflicts remain\n"
          fi
          if [ "$check_passed" -ne 0 ]; then
            failure_summary="${failure_summary}- cargo check failed\n"
          fi
          if [ -z "$failure_summary" ]; then
            failure_summary="- validation failed; inspect workflow logs\n"
          fi

          set +e
          last_errors="$(cargo check --workspace 2>&1 | tail -100)"
          set -e

          case "$validation_status" in
            passed)
              validation_section="$(cat <<SECTION_EOF
          ### Validation Results
          - [x] Workspace compilation
          - [x] Test build
          - [x] Targeted op-reth + mantle-reth tests
          - [x] Integration test build
          SECTION_EOF
          )"
              ;;
            partial)
              validation_section="$(cat <<SECTION_EOF
          ### Validation Results
          - [x] Workspace compilation
          - [ ] Some tests failed; manual review required
          SECTION_EOF
          )"
              ;;
            *)
              validation_section="$(cat <<SECTION_EOF
          ### Validation Results
          - [ ] Manual migration required

          Failure summary:
          $(printf "%b" "$failure_summary")

          <details><summary>Last cargo check output</summary>

          \`\`\`
          ${last_errors}
          \`\`\`

          </details>
          SECTION_EOF
          )"
              ;;
          esac

          warnings=""
          if [ "$rev_extraction_failed" = "true" ]; then
            warnings="${warnings}\n- Rev extraction failed; reth rev bump was skipped or incomplete."
          fi
          if [ "$lock_update_failed" = "true" ]; then
            warnings="${warnings}\n- cargo update failed; Cargo.lock may be stale."
          fi
          if [ "$has_unresolved_conflicts" = "true" ]; then
            warnings="${warnings}\n- Unresolved conflict markers remain."
          fi
          if [ "$has_manual_conflicts" = "true" ]; then
            warnings="${warnings}\n- Manual structural conflicts require human resolution."
          fi
          if [ "$sync_committed" != "true" ]; then
            warnings="${warnings}\n- Sync commit state: ${sync_committed}."
          fi

          title="deps: sync op-reth ${OLD_TAG} -> ${NEW_TAG} (${DATE})"
          {
            echo "## Automated op-reth Sync"
            echo
            echo "Synced \`op-reth/\` from upstream \`${OLD_TAG}\` to \`${NEW_TAG}\`."
            echo
            echo "**Base branch:** \`${BASE_BRANCH}\` at \`${BASE_SHA:0:7}\`"
            echo
            echo "### Upstream op-reth Changes"
            echo "[Compare: ${OLD_TAG}...${NEW_TAG}](https://github.com/ethereum-optimism/optimism/compare/${OLD_TAG}...${NEW_TAG})"
            echo
            echo "### Reth Core Rev"
            if [ "$reth_rev_bumped" = "true" ]; then
              echo "Bumped from \`${CURRENT_RETH_REV:0:7}\` to \`${UPSTREAM_RETH_REV:0:7}\` ([compare](https://github.com/paradigmxyz/reth/compare/${CURRENT_RETH_REV}...${UPSTREAM_RETH_REV}))"
            elif [ -n "${CURRENT_RETH_REV:-}" ]; then
              echo "Unchanged or skipped (\`${CURRENT_RETH_REV:0:7}\`)."
            else
              echo "Skipped; local rev could not be extracted."
            fi
            echo
            cat /tmp/compat-report.txt
            echo
            printf "%s\n" "$validation_section"
            echo
            if [ -s /tmp/patch-conflicts.txt ]; then
              echo "### Marker Conflicts"
              echo
              echo '```'
              cat /tmp/patch-conflicts.txt
              echo '```'
              echo
            fi
            if [ -s /tmp/manual-conflicts.txt ]; then
              echo "### Manual Conflicts"
              echo
              echo '```'
              cat /tmp/manual-conflicts.txt
              echo '```'
              echo
            fi
            if [ -n "$warnings" ]; then
              echo "### Workflow Warnings"
              printf "%b\n" "$warnings"
              echo
            fi
            if [ -f "$CONFLICT_REPORT" ]; then
              echo "### Conflict Report"
              echo "A conflict report is committed at \`${CONFLICT_REPORT}\`."
              echo
            fi
            echo "---"
            echo "Generated by op-reth-auto-bump workflow run ${GITHUB_RUN_NUMBER:-local}."
          } > /tmp/pr-body.txt

          build_artifacts

          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::dry_run=true; skipping push and PR creation"
            cat /tmp/pr-body.txt
            send_lark "op-reth auto-bump dry run" "Dry run completed for ${OLD_TAG} -> ${NEW_TAG} on ${BASE_BRANCH}. Validation: ${validation_status}."
            exit 0
          fi

          git push origin "$BRANCH_NAME" --force-with-lease

          existing_pr="$(gh pr list --head "$BRANCH_NAME" --base "$BASE_BRANCH" --json number --jq '.[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "$title" --body-file /tmp/pr-body.txt
            if [ "$validation_status" = "passed" ]; then
              gh pr ready "$existing_pr" 2>/dev/null || true
              gh pr edit "$existing_pr" --remove-label "blocked,needs-manual-migration" 2>/dev/null || true
              gh pr edit "$existing_pr" --add-label "A-dependencies" 2>/dev/null || true
            else
              gh pr edit "$existing_pr" --add-label "A-dependencies,needs-manual-migration" 2>/dev/null || true
              pr_node_id="$(gh pr view "$existing_pr" --json id --jq '.id')"
              gh api graphql -f query='
                mutation($id: ID!) {
                  convertPullRequestToDraft(input: {pullRequestId: $id}) {
                    pullRequest { isDraft }
                  }
                }' -f id="$pr_node_id" 2>/dev/null || true
            fi
          else
            if [ "$validation_status" = "passed" ]; then
              gh pr create \
                --base "$BASE_BRANCH" \
                --head "$BRANCH_NAME" \
                --title "$title" \
                --body-file /tmp/pr-body.txt \
                --label "A-dependencies"
            else
              gh pr create \
                --base "$BASE_BRANCH" \
                --head "$BRANCH_NAME" \
                --title "$title" \
                --body-file /tmp/pr-body.txt \
                --label "A-dependencies,needs-manual-migration" \
                --draft
            fi
          fi

          pr_url="$(gh pr view "$BRANCH_NAME" --json url --jq '.url' 2>/dev/null || echo "")"
          pr_number="$(gh pr view "$BRANCH_NAME" --json number --jq '.number' 2>/dev/null || echo "")"
          if [ "$validation_status" = "passed" ]; then
            send_lark "op-reth auto-bump PR ready" "PR #${pr_number}: ${pr_url}\n${OLD_TAG} -> ${NEW_TAG}\nValidation: passed."
          else
            send_lark "op-reth auto-bump needs review" "PR #${pr_number}: ${pr_url}\n${OLD_TAG} -> ${NEW_TAG}\nValidation: ${validation_status}."
          fi

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op-reth-auto-bump-artifacts
          path: .op-reth-auto-bump-artifacts/**
          if-no-files-found: ignore
